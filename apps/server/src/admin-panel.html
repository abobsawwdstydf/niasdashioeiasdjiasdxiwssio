<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexo Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }
    .login-form, .admin-panel { display: none; }
    .login-form.active, .admin-panel.active { display: block; }
    input, button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin: 30px 0;
    }
    .stat-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
    }
    .stat-label {
      color: #666;
      margin-top: 5px;
    }
    .config-section {
      margin: 30px 0;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 15px;
    }
    .config-section h3 {
      margin-bottom: 15px;
      color: #333;
    }
    .error {
      background: #fee;
      color: #c00;
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
      display: none;
    }
    .success {
      background: #efe;
      color: #080;
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
      display: none;
    }
    .logout-btn {
      background: #dc3545;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Nexo Admin Panel</h1>
    
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    
    <!-- Login Form -->
    <div id="loginForm" class="login-form active">
      <input type="password" id="password" placeholder="Введите пароль администратора">
      <button onclick="login()">Войти</button>
    </div>
    
    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
      <div class="stats">
        <div class="stat-card">
          <div id="userCount" class="stat-value">0</div>
          <div class="stat-label">Пользователей</div>
        </div>
        <div class="stat-card">
          <div id="chatCount" class="stat-value">0</div>
          <div class="stat-label">Чатов</div>
        </div>
        <div class="stat-card">
          <div id="messageCount" class="stat-value">0</div>
          <div class="stat-label">Сообщений</div>
        </div>
        <div class="stat-card">
          <div id="storageSize" class="stat-value">0 MB</div>
          <div class="stat-label">Хранилище</div>
        </div>
      </div>
      
      <div class="config-section">
        <h3>🗄️ База данных</h3>
        <input type="text" id="dbUrl" placeholder="PostgreSQL URL">
        <button onclick="updateDatabase()">Обновить БД</button>
      </div>
      
      <div class="config-section">
        <h3>📡 Redis</h3>
        <input type="text" id="redisUrl" placeholder="Redis URL">
        <button onclick="updateRedis()">Обновить Redis</button>
      </div>
      
      <div class="config-section">
        <h3>🤖 Telegram Боты</h3>
        <textarea id="telegramConfig" rows="4" style="width:100%;margin:10px 0;padding:10px;border-radius:10px;border:2px solid #e0e0e0;" placeholder="Конфигурация ботов и каналов"></textarea>
        <button onclick="updateTelegram()">Обновить Telegram</button>
      </div>
      
      <div class="config-section">
        <h3>🗑️ Кэш</h3>
        <button onclick="clearCache()" style="background: #ffc107; color: #000;">Очистить кэш</button>
      </div>
      
      <div class="config-section">
        <h3>🔄 Система</h3>
        <button onclick="restartServer()" style="background: #dc3545;">Перезагрузить сервер</button>
      </div>
      
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin + '/api/admin';
    let authToken = localStorage.getItem('admin_token');
    
    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
      setTimeout(() => document.getElementById('error').style.display = 'none', 3000);
    }
    
    function showSuccess(msg) {
      document.getElementById('success').textContent = msg;
      document.getElementById('success').style.display = 'block';
      setTimeout(() => document.getElementById('success').style.display = 'none', 3000);
    }
    
    async function login() {
      const password = document.getElementById('password').value;
      try {
        const res = await fetch(API_URL + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          authToken = data.token;
          localStorage.setItem('admin_token', authToken);
          showPanel();
        } else {
          showError(data.error);
        }
      } catch (e) {
        showError('Ошибка подключения');
      }
    }
    
    function logout() {
      localStorage.removeItem('admin_token');
      authToken = null;
      document.getElementById('loginForm').classList.add('active');
      document.getElementById('adminPanel').classList.remove('active');
    }
    
    async function showPanel() {
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('adminPanel').classList.add('active');
      loadStats();
      loadConfig();
    }
    
    async function loadStats() {
      try {
        const res = await fetch(API_URL + '/stats', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        const data = await res.json();
        document.getElementById('userCount').textContent = data.users;
        document.getElementById('chatCount').textContent = data.chats;
        document.getElementById('messageCount').textContent = data.messages;
        document.getElementById('storageSize').textContent = (data.storage / 1024 / 1024).toFixed(2) + ' MB';
      } catch (e) {
        showError('Не удалось загрузить статистику');
      }
    }
    
    async function loadConfig() {
      try {
        const res = await fetch(API_URL + '/config', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        const data = await res.json();
        document.getElementById('dbUrl').value = data.database?.url || '';
        document.getElementById('redisUrl').value = data.redis?.url || '';
        document.getElementById('telegramConfig').value = JSON.stringify({
          bots: data.telegram?.botCount || 0,
          channels: data.telegram?.channelCount || 0
        }, null, 2);
      } catch (e) {
        showError('Не удалось загрузить конфигурацию');
      }
    }
    
    async function updateDatabase() {
      const databaseUrl = document.getElementById('dbUrl').value;
      try {
        const res = await fetch(API_URL + '/config/database', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + authToken
          },
          body: JSON.stringify({ databaseUrl, usePostgreSQL: databaseUrl.includes('postgres') })
        });
        const data = await res.json();
        if (data.success) showSuccess(data.message);
        else showError(data.error);
      } catch (e) {
        showError('Ошибка обновления БД');
      }
    }
    
    async function updateRedis() {
      const redisUrl = document.getElementById('redisUrl').value;
      try {
        const res = await fetch(API_URL + '/config/redis', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + authToken
          },
          body: JSON.stringify({ redisUrl, enabled: !!redisUrl })
        });
        const data = await res.json();
        if (data.success) showSuccess(data.message);
        else showError(data.error);
      } catch (e) {
        showError('Ошибка обновления Redis');
      }
    }
    
    async function updateTelegram() {
      const config = document.getElementById('telegramConfig').value;
      try {
        const res = await fetch(API_URL + '/config/telegram', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + authToken
          },
          body: config
        });
        const data = await res.json();
        if (data.success) showSuccess(data.message);
        else showError(data.error);
      } catch (e) {
        showError('Ошибка обновления Telegram');
      }
    }
    
    async function clearCache() {
      try {
        const res = await fetch(API_URL + '/cache/clear', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        const data = await res.json();
        if (data.success) showSuccess(data.message);
        else showError(data.error);
      } catch (e) {
        showError('Ошибка очистки кэша');
      }
    }
    
    async function restartServer() {
      if (!confirm('Вы уверены? Сервер перезагрузится!')) return;
      try {
        const res = await fetch(API_URL + '/system/restart', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        const data = await res.json();
        if (data.success) showSuccess(data.message);
        else showError(data.error);
      } catch (e) {
        showError('Ошибка перезагрузки');
      }
    }
    
    // Auto-login if token exists
    if (authToken) {
      showPanel();
    }
  </script>
</body>
</html>
