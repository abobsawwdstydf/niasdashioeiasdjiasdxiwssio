services:
  - type: web
    name: nexo-messenger
    env: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    buildFilter:
      paths:
        - apps/server/**
        - Dockerfile
        - start.sh
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_SESSION_URL
        sync: false
      - key: REDIS_URLS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: STORAGE_MODE
        value: local
      - key: MAX_REGISTRATIONS_PER_IP
        value: "10"
    disk:
      name: nexo-storage
      mountPath: /app/apps/server/storage
      sizeGB: 1
