services:
  - type: web
    name: nexo-messenger
    env: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_SESSION_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_MODE
        value: telegram
      - key: MAX_REGISTRATIONS_PER_IP
        value: "10"
    disk:
      name: uploads
      mountPath: /app/apps/server/uploads
      sizeGB: 1
